name: Release AGM

on:
    push:
        tags:
            - "agm-v*"

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      platform: linux-x86_64
                      ext: ""
                    - os: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      platform: linux-aarch64
                      ext: ""
                    - os: ubuntu-latest
                      target: riscv64gc-unknown-linux-gnu
                      platform: linux-riscv64
                      ext: ""
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      platform: macos-x86_64
                      ext: ""
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      platform: macos-aarch64
                      ext: ""
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      platform: windows-x86_64
                      ext: ".exe"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set version from tag
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME#agm-v}"
                  echo "Setting version to ${VERSION}"
                  sed -i.bak -e "s/^version = \".*\"/version = \"${VERSION}\"/" agm/Cargo.toml
                  rm -f agm/Cargo.toml.bak

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry/index
                      ~/.cargo/registry/cache
                      ~/.cargo/git/db
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-

            - name: Cache build artifacts
              uses: actions/cache@v4
              with:
                  path: target
                  key: ${{ runner.os }}-${{ matrix.target }}-agm-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-${{ matrix.target }}-agm-
                      ${{ runner.os }}-${{ matrix.target }}-

            - name: Install cross
              if: runner.os == 'Linux'
              run: cargo install cross

            - name: Build agm (Linux)
              if: runner.os == 'Linux'
              run: cross build --release --target ${{ matrix.target }} -p agm

            - name: Build agm (non-Linux)
              if: runner.os != 'Linux'
              run: cargo build --release --target ${{ matrix.target }} -p agm

            - name: Package binaries (Unix)
              if: matrix.ext == ''
              run: |
                  mkdir -p agm/dist
                  cp target/${{ matrix.target }}/release/agm agm/dist/agm-${{ matrix.platform }}
                  chmod +x agm/dist/agm-${{ matrix.platform }}
                  tar -czf agm/dist/agm-${{ matrix.platform }}.tar.gz -C agm/dist agm-${{ matrix.platform }}
                  rm agm/dist/agm-${{ matrix.platform }}

            - name: Package binaries (Windows)
              if: matrix.ext == '.exe'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path agm/dist
                  Copy-Item "target/${{ matrix.target }}/release/agm.exe" "agm/dist/agm-${{ matrix.platform }}.exe"
                  Compress-Archive -Path "agm/dist/agm-${{ matrix.platform }}.exe" -DestinationPath "agm/dist/agm-${{ matrix.platform }}.zip"
                  Remove-Item "agm/dist/agm-${{ matrix.platform }}.exe"

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: binaries-${{ matrix.platform }}
                  path: agm/dist/
                  retention-days: 7

    release:
        name: Create GitHub Release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts/
                  merge-multiple: true

            - name: List artifacts
              run: ls -lR artifacts/

            - name: Generate checksums
              run: |
                  cd artifacts
                  sha256sum * > checksums.txt
                  cat checksums.txt

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      artifacts/*
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

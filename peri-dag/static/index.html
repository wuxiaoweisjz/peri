<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>peri-dag</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f6f8fa;
  --bg3: #eaeef2;
  --bg4: #d0d7de;
  --border: #d1d5da;
  --text: #1f2328;
  --text2: #656d76;
  --green: #1a7f37;
  --blue: #0969da;
  --red: #cf222e;
  --yellow: #9a6700;
  --orange: #bc4c00;
  --purple: #8250df;
  --gray: #8b949e;
  --accent: #0969da;
  --accent-hover: #0550ae;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden; }
#sidebar { width:340px; min-width:340px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* Tab bar — removed, templates are direct */

/* Template cards */
.template-card { padding:12px 16px; border-bottom:1px solid var(--border); transition:background 0.15s; }
.template-card:hover { background:var(--bg3); }
.template-name { font-size:13px; font-weight:600; margin-bottom:3px; }
.template-desc { font-size:11px; color:var(--text2); margin-bottom:6px; line-height:1.4; }
.template-meta { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text2); margin-bottom:6px; }
.template-meta .tag { background:var(--bg3); border:1px solid var(--border); padding:1px 6px; border-radius:3px; font-size:10px; }
.template-actions { display:flex; gap:8px; }
.btn { padding:5px 12px; border-radius:4px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-family:inherit; width:auto; margin:0; }
.btn:hover { background:var(--bg4); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); opacity:1; }
.btn-sm { padding:3px 8px; font-size:10px; }
.template-empty { padding:32px 16px; text-align:center; color:var(--text2); font-size:13px; }

/* Template section */
.runs-header { padding:10px 16px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); font-size:12px; font-weight:600; display:flex; justify-content:space-between; align-items:center; background:var(--bg2); flex-shrink:0; }
.runs-header .count { font-size:10px; color:var(--text2); }
#run-list { overflow:auto; flex:1; }
.run-item { padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.run-item:hover { background:var(--bg3); }
.run-item.active { background:var(--bg3); border-left:3px solid var(--accent); padding-left:13px; }
.run-name { font-weight:600; font-size:12px; margin-bottom:3px; display:flex; align-items:center; gap:6px; }
.run-meta { font-size:10px; color:var(--text2); display:flex; gap:10px; }

/* Status indicators */
.status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.s-pending  { background:var(--gray); }
.s-running  { background:var(--blue); animation:pulse 1s infinite; }
.s-success  { background:var(--green); }
.s-failed   { background:var(--red); }
@keyframes pulse { 50% { opacity:0.4; } }

/* DAG panel */
#graph-panel { height:48%; border-bottom:1px solid var(--border); position:relative; overflow:hidden; min-height:150px; }
#graph-svg { width:100%; height:100%; cursor:grab; }
#graph-svg:active { cursor:grabbing; }
.edge-line { stroke:var(--border); stroke-width:1.5; fill:none; }
.edge-arrow { fill:var(--border); }
.node-group { cursor:pointer; }
.node-rect { stroke-width:2; rx:6; ry:6; transition:opacity 0.15s; }
.node-group:hover .node-rect { opacity:0.85; }
.node-title { font-size:10px; font-weight:600; fill:var(--text); text-anchor:middle; }
.node-sub   { font-size:9px; fill:var(--text2); text-anchor:middle; }
.zoom-controls { position:absolute; bottom:10px; right:10px; display:flex; gap:4px; z-index:10; }
.zoom-btn { width:28px; height:28px; border-radius:4px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
.zoom-btn:hover { background:var(--bg4); }
#graph-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text2); font-size:13px; }

/* Logs panel */
#log-panel { flex:1; overflow:auto; padding:12px 16px 16px; }
#log-panel h3 { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.log-section { margin-bottom:8px; }
.log-header { display:flex; justify-content:space-between; align-items:center; padding:7px 10px; background:var(--bg3); border-radius:4px; cursor:pointer; font-size:11px; border-left:3px solid var(--gray); }
.log-header:hover { background:var(--bg4); }
.log-header.running { border-left-color:var(--blue); }
.log-header.success { border-left-color:var(--green); }
.log-header.failed  { border-left-color:var(--red); }
.log-body { margin-top:2px; display:none; }
.log-body.open { display:block; }
pre { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px; font-size:11px; overflow-x:auto; max-height:280px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; color:var(--text); font-family:"SF Mono",Menlo,monospace; margin-top:4px; }
pre.stderr { border-color:var(--red); background:#fff0f0; }
.log-empty { text-align:center; padding:40px 20px; color:var(--text2); font-size:13px; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="templates-section">
    <div class="template-empty"><span class="spinner"></span> Loading...</div>
  </div>

  <div class="runs-header">
    <span>Runs</span>
    <span class="count" id="run-count"></span>
  </div>
  <div id="run-list"><div class="log-empty" style="padding:24px">No runs yet</div></div>
</div>

<div id="main">
  <div id="graph-panel">
    <div id="graph-placeholder">Select a run to view DAG</div>
    <svg id="graph-svg" style="display:none"></svg>
    <div class="zoom-controls" style="display:none" id="zoom-ctls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
      <button class="zoom-btn" onclick="zoomFit()" title="Fit">&#8982;</button>
    </div>
  </div>
  <div id="log-panel">
    <div class="log-empty">Select a run to view logs</div>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────
const API_WF = '/api/v1/workflows';
const API_TPL = '/api/v1/templates';
let selectedRunId = null;
let refreshTimer = null;

// DAG view state
let dagZoom = 1, dagPanX = 0, dagPanY = 0;
let dragging = false, dragStart = {};

// ── Templates ───────────────────────────────────────────────────────
async function loadTemplates() {
  const el = document.getElementById('templates-section');
  try {
    const r = await fetch(API_TPL);
    const d = await r.json();
    const tpls = d.templates || [];
    if (!tpls.length) {
      el.innerHTML = '<div class="template-empty">No templates found<br><span style="font-size:11px">use --workflow-dir to watch a directory</span></div>';
      return;
    }
    el.innerHTML = tpls.map(t => `
      <div class="template-card">
        <div class="template-name">${esc(t.name)}</div>
        <div class="template-desc">${esc(t.description || 'No description')}</div>
        <div class="template-meta">
          <span class="tag">v${esc(t.version)}</span>
          <span class="tag">${t.node_count} nodes</span>
          <span class="tag" title="${esc(t.file_path)}">${esc(basename(t.file_path))}</span>
        </div>
        <div class="template-actions">
          <button class="btn btn-primary btn-sm" onclick="runTemplate('${esc(t.name)}')">&#9654; Run</button>
        </div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<div class="template-empty" style="color:var(--red)">Failed to load templates</div>';
  }
}

async function runTemplate(name) {
  try {
    const r = await fetch(`${API_TPL}/${encodeURIComponent(name)}/run`, { method:'POST' });
    const d = await r.json();
    if (r.ok) {
      selectedRunId = d.run_id;
      loadRuns();
    }
  } catch(e) {}
}

// ── Runs ────────────────────────────────────────────────────────────
async function loadRuns() {
  const el = document.getElementById('run-list');
  try {
    const r = await fetch(API_WF);
    const d = await r.json();
    const runs = d.runs || [];
    document.getElementById('run-count').textContent = runs.length ? `${runs.length} total` : '';
    if (!runs.length) { el.innerHTML = '<div class="log-empty" style="padding:24px">No runs yet</div>'; return; }
    el.innerHTML = runs.map(run => {
      const cls = run.id === selectedRunId ? 'run-item active' : 'run-item';
      return `<div class="${cls}" onclick="selectRun('${run.id}')">
        <div class="run-name"><span class="status-dot s-${run.status}"></span>${esc(run.workflow_name)}</div>
        <div class="run-meta">
          <span>${run.status}</span>
          <span>v${esc(run.workflow_version)}</span>
          <span>${run.node_count} nodes</span>
          <span>${fmtTime(run.created_at)}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="log-empty" style="color:var(--red)">Failed to load</div>';
  }
}

// ── Select Run ──────────────────────────────────────────────────────
async function selectRun(id) {
  selectedRunId = id;
  loadRuns();
  try {
    const r = await fetch(`${API_WF}/${id}`);
    const run = await r.json();
    renderGraph(run);
    renderLogs(run);
  } catch(e) {}

  clearInterval(refreshTimer);
  // Auto-refresh if active
  fetch(`${API_WF}/${id}`).then(r => r.json()).then(run => {
    if (run.status === 'running' || run.status === 'pending') {
      refreshTimer = setInterval(() => selectRun(id), 2000);
    }
  }).catch(()=>{});
}

// ── DAG Graph ───────────────────────────────────────────────────────
const NODE_W = 130, NODE_H = 44, LEVEL_GAP_X = 80, NODE_GAP_Y = 14, PAD = 40;

function renderGraph(run) {
  const ph = document.getElementById('graph-placeholder');
  const svgEl = document.getElementById('graph-svg');
  const zoomCtls = document.getElementById('zoom-ctls');
  const nodes = run.nodes || [];

  if (!nodes.length) {
    ph.style.display = 'flex'; svgEl.style.display = 'none'; zoomCtls.style.display = 'none';
    return;
  }

  ph.style.display = 'none';
  svgEl.style.display = 'block';
  zoomCtls.style.display = 'flex';

  // Build dependency graph
  const idxMap = {}; nodes.forEach((n,i) => idxMap[n.node_id] = i);
  const adj = nodes.map(() => []);
  const inDeg = nodes.map(() => 0);
  nodes.forEach((n,i) => {
    (n.depends || []).forEach(d => {
      const j = idxMap[d];
      if (j !== undefined) { adj[j].push(i); inDeg[i]++; }
    });
  });

  // Topological sort into levels
  const levels = [];
  let queue = nodes.map((_,i)=>i).filter(i => inDeg[i]===0);
  while (queue.length) {
    levels.push([...queue]);
    const next = [];
    queue.forEach(i => adj[i].forEach(j => { inDeg[j]--; if (inDeg[j]===0) next.push(j); }));
    queue = next;
  }
  // If cycles exist, put remaining nodes in a final level
  const placed = new Set(levels.flat());
  const remaining = nodes.map((_,i)=>i).filter(i => !placed.has(i));
  if (remaining.length) levels.push(remaining);

  // Layout
  const maxPerLevel = Math.max(1, ...levels.map(l => l.length));
  const totalW = levels.length * (NODE_W + LEVEL_GAP_X) - LEVEL_GAP_X + PAD * 2;
  const totalH = maxPerLevel * (NODE_H + NODE_GAP_Y) - NODE_GAP_Y + PAD * 2;

  // Reset view
  dagZoom = 1; dagPanX = 0; dagPanY = 0;

  // Positions
  const pos = {};
  levels.forEach((level, li) => {
    const x = PAD + li * (NODE_W + LEVEL_GAP_X);
    const startY = PAD + (maxPerLevel - level.length) * (NODE_H + NODE_GAP_Y) / 2;
    level.forEach((ni, si) => {
      pos[ni] = { x, y: startY + si * (NODE_H + NODE_GAP_Y) };
    });
  });

  // Build SVG
  let html = '';
  // Edges
  nodes.forEach((n,i) => {
    (n.depends || []).forEach(d => {
      const j = idxMap[d];
      if (j === undefined || !pos[i] || !pos[j]) return;
      const from = pos[j], to = pos[i];
      const x1 = from.x + NODE_W, y1 = from.y + NODE_H / 2;
      const x2 = to.x, y2 = to.y + NODE_H / 2;
      html += `<path d="M${x1} ${y1} C${(x1+x2)/2} ${y1} ${(x1+x2)/2} ${y2} ${x2} ${y2}" class="edge-line"/>`;
    });
  });

  // Nodes
  nodes.forEach((n,i) => {
    if (!pos[i]) return;
    const {x, y} = pos[i];
    const color = statusColor(n.status);
    html += `<g class="node-group" onclick="jumpToLog('${n.id}')">
      <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}" class="node-rect" fill="var(--bg2)" stroke="${color}"/>
      <text x="${x + NODE_W/2}" y="${y + 16}" class="node-title">${esc(n.node_id)}</text>
      <text x="${x + NODE_W/2}" y="${y + 32}" class="node-sub">${n.node_type} · ${n.status}${n.exit_code!=null ? ' · exit='+n.exit_code : ''}</text>
    </g>`;
  });

  svgEl.setAttribute('viewBox', `0 0 ${Math.max(totalW,400)} ${Math.max(totalH,200)}`);
  svgEl.innerHTML = html;
  applyTransform();
}

function applyTransform() {
  const svg = document.getElementById('graph-svg');
  svg.style.transform = `translate(${dagPanX}px,${dagPanY}px) scale(${dagZoom})`;
  svg.style.transformOrigin = '0 0';
}

function zoomIn()  { dagZoom = Math.min(3, dagZoom * 1.25); applyTransform(); }
function zoomOut() { dagZoom = Math.max(0.25, dagZoom / 1.25); applyTransform(); }
function zoomFit() { dagZoom = 1; dagPanX = 0; dagPanY = 0; applyTransform(); }

// Pan with mouse drag
(function() {
  const svg = document.getElementById('graph-svg');
  svg.addEventListener('mousedown', e => {
    dragging = true; dragStart = { x: e.clientX - dagPanX, y: e.clientY - dagPanY };
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    dagPanX = e.clientX - dragStart.x;
    dagPanY = e.clientY - dragStart.y;
    applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; });
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    dagZoom = Math.max(0.25, Math.min(3, dagZoom * delta));
    applyTransform();
  });
})();

function jumpToLog(nodeRunId) {
  const el = document.querySelector(`.log-section[data-node="${nodeRunId}"]`);
  if (el) {
    el.scrollIntoView({ behavior:'smooth', block:'center' });
    // Auto-open
    const body = el.querySelector('.log-body');
    if (body && !body.classList.contains('open')) el.querySelector('.log-header').click();
  }
}

// ── Logs ────────────────────────────────────────────────────────────
function renderLogs(run) {
  const nodes = run.nodes || [];
  const panel = document.getElementById('log-panel');
  if (!nodes.length) { panel.innerHTML = '<div class="log-empty">No nodes</div>'; return; }

  panel.innerHTML = `<h3><span class="status-dot s-${run.status}"></span> ${esc(run.workflow_name)} · ${run.status}</h3>` +
    nodes.map(n => `
      <div class="log-section" data-node="${n.id}">
        <div class="log-header ${n.status}" onclick="toggleLog(this, '${n.id}')">
          <span><span class="status-dot s-${n.status}"></span> <b>${esc(n.node_id)}</b> — ${n.node_type}</span>
          <span style="font-size:10px;color:var(--text2)">${n.status}${n.attempt>0?` (retry ${n.attempt})`:''}${n.exit_code!=null?` exit=${n.exit_code}`:''}</span>
        </div>
        <div class="log-body" id="log-body-${n.id}">
          ${n.stdout ? `<pre>${esc(n.stdout)}</pre>` : ''}
          ${n.stderr ? `<pre class="stderr">${esc(n.stderr)}</pre>` : ''}
          ${n.error_message ? `<pre class="stderr">${esc(n.error_message)}</pre>` : ''}
          ${!n.stdout && !n.stderr && !n.error_message ? '<div style="font-size:11px;color:var(--text2);padding:8px">No output</div>' : ''}
        </div>
      </div>`).join('');
}

function toggleLog(header, nodeId) {
  const body = document.getElementById('log-body-' + nodeId);
  if (!body) return;
  if (!body.classList.contains('open')) {
    body.classList.add('open');
    fetchLogs(nodeId, body);
  } else {
    body.classList.remove('open');
  }
}

async function fetchLogs(nodeRunId, el) {
  if (!selectedRunId) return;
  try {
    const r = await fetch(`${API_WF}/${selectedRunId}/nodes/${nodeRunId}/logs`);
    const d = await r.json();
    el.innerHTML = ''
      + (d.stdout ? `<pre>${esc(d.stdout)}</pre>` : '')
      + (d.stderr ? `<pre class="stderr">${esc(d.stderr)}</pre>` : '')
      + (d.error_message ? `<pre class="stderr">${esc(d.error_message)}</pre>` : '')
      + (!d.stdout && !d.stderr && !d.error_message ? '<div style="font-size:11px;color:var(--text2);padding:8px">No output</div>' : '');
  } catch(e) {
    el.innerHTML = '<div style="color:var(--red);font-size:11px">Failed to load</div>';
  }
}

// ── Helpers ─────────────────────────────────────────────────────────
function statusColor(s) { return {pending:'var(--gray)',running:'var(--blue)',success:'var(--green)',failed:'var(--red)'}[s]||'var(--gray)'; }
function fmtTime(t) { if(!t)return'-'; const d=new Date(t); return d.toLocaleTimeString(); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function basename(p) { return (p||'').split('/').pop(); }

// ── Init ────────────────────────────────────────────────────────────
loadTemplates();
loadRuns();
setInterval(loadTemplates, 15000);
setInterval(loadRuns, 5000);
</script>
</body>
</html>

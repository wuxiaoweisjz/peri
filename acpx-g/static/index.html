<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>acpx-g</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div id="sidebar">
  <div class="runs-header" style="flex-shrink:0">
    <span>Templates</span>
    <button class="btn btn-sm" onclick="showAllApiDocs()" title="API documentation">API</button>
  </div>
  <div id="templates-section" style="overflow:auto;flex:1;min-height:0">
    <div class="template-empty"><span class="spinner"></span> Loading...</div>
  </div>

  <div class="runs-header">
    <span>Runs</span>
    <span class="count" id="run-count"></span>
  </div>
  <div id="run-list"><div class="log-empty" style="padding:24px">No runs yet</div></div>
</div>

<div id="main">
  <div id="preview-header">
    <div class="info">
      <h2 id="preview-name"></h2>
      <p id="preview-desc"></p>
    </div>
    <div id="preview-inputs" style="display:none"></div>
    <button class="btn btn-primary" id="preview-run-btn">&#9654; Run</button>
  </div>
  <div id="graph-panel">
    <div id="graph-placeholder">Select a template or run to view pipeline</div>
    <svg id="graph-svg" style="display:none"></svg>
    <div class="zoom-controls" style="display:none" id="zoom-ctls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
      <button class="zoom-btn" onclick="zoomFit()" title="Fit">&#8982;</button>
    </div>
  </div>
  <div id="log-panel">
    <div class="log-empty">Select a run to view logs</div>
  </div>
</div>

<script src="api-docs.js?v=2"></script>
<script src="app.js?v=2"></script>

<div id="api-modal" style="display:none">
  <div class="modal-backdrop" onclick="closeApiModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="api-modal-title">API Reference</h2>
      <button class="modal-close" onclick="closeApiModal()">&times;</button>
    </div>
    <div class="modal-body" id="api-docs-body"></div>
  </div>
</div>
</body>
</html>
